spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nyc_amenity
    username: amenity_user
    password: amenity_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true